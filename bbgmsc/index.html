<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Emulator for BBG Multimedia Student Computer</title>
    </head>
    <body>
        <canvas id="screen" width="256" height="240"
                style="background-color: #000000;"></canvas>
        <p>
        <select id="diskname">
            <option value="demo.IMG">Demo 演示盘</option>
            <option value="003.IMG">Disk 003 打字 拼音 唐诗</option>
            <option value="004.IMG" selected>Disk 004 轻轻松松学DOS</option>
            <option value="006.IMG">Disk 006 英语单词步步高</option>
        </select>
        </p>
        <p>
        <button id="startkey" onclick="start()">Start</button>
        <button onClick="window.location.reload();">Reload</button>
        <button onclick="request_pointer_lock()">Grab</button>
        <button onclick="request_fullscreen()">Fullscreen</button>
        </p>
        <textarea id="logarea" rows="10" cols="30" readonly></textarea>
        <script src="main.js"></script>
    </body>
</html>
