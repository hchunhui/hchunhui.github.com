<!DOCTYPE html>
<html>
    <head>
        <title>Tiny386</title>
        <link rel="stylesheet" href="98.css" />
        <style>
            body {
                background: #c0c0c0;
            }
            table {
                background: inherit;
            }
            hr {
                width: 20%;
                margin-left: 0;
            }
            .window {
                display: inline-block;
                -webkit-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
            }
        </style>
        <style>
          #virtual-kb {
              background: #d1d4d9; padding: 10px;
              display: none; flex-direction: column; gap: 8px;
              user-select: none; font-family: sans-serif;
          }
          .kb-row { display: flex; justify-content: center; gap: 5px; }
          .key {
              background: #fff; border: none; border-radius: 4px;
              padding: 12px 0; min-width: 0px; width: 35px; text-align: center;
              cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.2);
          }
          .key.space { width: 280px; }
          .key.fkey { width: 35px; background: #abb2bb; }
          .key.wide { width: 52.5px; background: #abb2bb; }
          .key:active { background: #ced4da; }
        </style>
    </head>
    <body>
        <hr>
        <div class="window" id="win1">
            <div class="title-bar" id="tit1">
                <div class="title-bar-text">Tiny386 / WebAssembly</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize" id="btn11"></button>
                    <button aria-label="Maximize" id="btn12"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body">
                <center>
                <canvas id="screen" width="720" height="480"
                        style="background-color: #000000;"></canvas>
                </center>
                <p>
                    <select id="configname">
                        <option value="pwin32.ini">Win3.2</option>
                        <option value="micro95.ini">Micro Win95</option>
                        <option value="jslinux.ini">JSLinux</option>
                        <option value="freedos.ini">FreeDOS</option>
                    </select>
                    <button onclick="start()">Start</button>
                    <button onClick="stop()">Stop</button>
                    <button onclick="request_pointer_lock()">Grab</button>
                    <button onclick="request_fullscreen()">Fullscreen</button>
                    <button onclick="sendCAD()">CtrlAltDel</button>
                    <button onclick="sendMR()">RightClick</button>
                    <button onclick="toggle_keyboard()">Keyboard</button>
                </p>
                <textarea id="logarea" rows="10" cols="98" style="font-family: monospace; background: inherit;" readonly></textarea>
            </div>
        </div>
        <div class="window" id="win3" style="display: none">
            <div class="title-bar" id="tit3">
                <div class="title-bar-text">Keyboard</div>
                <div class="title-bar-controls">
                </div>
            </div>
            <div class="window-body">
                <div id="virtual-kb">
                    <div class="kb-row" id="row1"></div>
                    <div class="kb-row" id="row2"></div>
                    <div class="kb-row" id="row3"></div>
                    <div class="kb-row" id="row4"></div>
                    <div class="kb-row" id="row5"></div>
                    <div class="kb-row" id="row6"></div>
                </div>
            </div>
        </div>
        <script src="unzstd.js"></script>
        <script src="main.js"></script>
        <script>
            let inst = null;
            function start() {
                if (inst === null) {
                    inst = get_tiny386(document.getElementById('screen'));
                    const o = document.getElementById('logarea');
                    inst.set_logger(function (s) {
                        const len = o.value.length;
                        if (len > 40960)
                            o.value = o.value.substring(len - 40960, len) + s;
                        else
                            o.value += s;
                        o.scrollTop = o.scrollHeight;
                    });
                    const inifile = document.getElementById('configname').value;
                    inst.start(inifile);
                }
            }

            function stop() {
                if (inst !== null) {
                    inst.stop();
                    inst = null;
                }
            }

            function request_pointer_lock()
            {
                const screen = document.getElementById('screen');
                screen.tabIndex = 1;
                screen.focus();
                screen.requestPointerLock();
            }

            function request_fullscreen()
            {
                const screen = document.getElementById('screen');
                screen.tabIndex = 1;
                screen.focus();
                screen.requestFullscreen();
                screen.style.cursor = 'none';
            }

            function sendCAD() {
                inst.send_kbd(1, 0x1d);
                inst.send_kbd(1, 0x38);
                inst.send_kbd(1, 0x53);
                inst.send_kbd(0, 0x53);
                inst.send_kbd(0, 0x38);
                inst.send_kbd(0, 0x1d);
            };

            function sendMR() {
                inst.send_mouse(0, 0, 0, 2);
                inst.send_mouse(0, 0, 0, 0);
            };

            function toggle_keyboard()
            {
                let kbwin = document.getElementById('win3');
                if (kbwin.style.display === 'none')
                    kbwin.style.display = 'block';
                else
                    kbwin.style.display = 'none';
            }
        </script>
        <hr>
        <div class="window" id="win2">
            <div class="title-bar inactive" id="tit2">
                <div class="title-bar-text">Win95 on ESP32-S3</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize" id="btn21"></button>
                    <button aria-label="Maximize" id="btn22"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body">
                <video src="esp32s3_win95.webm" width="720" id="video"></video>
                <table><tr>
                    <td><button id="playbtn">&#9654;</button></td>
                    <td><span id="timedisp">00:00/00:00</span></td>
                    <td width="500"><input type="range" id="timeline" value="0" min="0" max="100" step="0.1"></td>
                </tr></table>
            </div>
        </div>
        <script>
            const video = document.getElementById('video');
            const playbtn = document.getElementById('playbtn');
            const timeline = document.getElementById('timeline');
            const timedisp = document.getElementById('timedisp');

            video.addEventListener('timeupdate', () => {
                timeline.value = (video.currentTime / video.duration) * 100;
                function f(time) {
                    const m = Math.floor(time / 60).toString();
                    let s = Math.floor(time % 60);
                    if (s < 10)
                        s = '0' + s.toString();
                    else
                        s = s.toString();
                    return m + ':' + s;
                }
                timedisp.textContent = f(video.currentTime) + '/' + f(video.duration);
            });

            timeline.addEventListener('input', () => {
                video.currentTime = (timeline.value / 100) * video.duration;
            });

            playbtn.addEventListener('click', () => {
                if (video.paused) {
                    video.play();
                    video.controls = true;
                    playbtn.innerHTML = '&#9208;';
                } else {
                    video.pause();
                    video.controls = false;
                    playbtn.innerHTML = '&#9654;';
                }
            });
        </script>
        <script>
          (function() {
          const kb = document.getElementById('virtual-kb');
          const handle = document.getElementById('kb-handle');

          const key2code = {
              "Esc": 0x0001,
              "1": 0x0002, "2": 0x0003, "3": 0x0004, "4": 0x0005, "5": 0x0006,
              "6": 0x0007, "7": 0x0008, "8": 0x0009, "9": 0x000a, "0": 0x000b,
              "-": 0x000c, "=": 0x000d, "Back": 0x000e, "Tab": 0x000f,
              "Q": 0x0010, "W": 0x0011, "E": 0x0012, "R": 0x0013, "T": 0x0014,
              "Y": 0x0015, "U": 0x0016, "I": 0x0017, "O": 0x0018, "P": 0x0019,
              "[": 0x001a, "]": 0x001b, "Enter": 0x001c, "Ctrl": 0x001d,
              "A": 0x001e, "S": 0x001f, "D": 0x0020, "F": 0x0021, "G": 0x0022,
              "H": 0x0023, "J": 0x0024, "K": 0x0025, "L": 0x0026, ";": 0x0027,
              "'": 0x0028, "`": 0x0029, "Shift": 0x002a, "\\": 0x002b,
              "Z": 0x002c, "X": 0x002d, "C": 0x002e, "V": 0x002f, "B": 0x0030,
              "N": 0x0031, "M": 0x0032, ",": 0x0033, ".": 0x0034, "/": 0x0035,
              "Alt": 0x0038, "Space": 0x0039, "Caps": 0x003a,
              "F1": 0x003b, "F2": 0x003c, "F3": 0x003d, "F4": 0x003e, "F5": 0x003f,
              "F6": 0x0040, "F7": 0x0041, "F8": 0x0042, "F9": 0x0043, "F10": 0x0044,
              "F11": 0x0057, "F12": 0x0058,
              "Home": 0xe047, "Up": 0xe048, "PgUp": 0xe049, "Left": 0xe04b,
              "Right": 0xe04d, "End": 0xe04f, "Down": 0xe050, "PgDn": 0xe051,
              "Insert": 0xe052, "Del": 0xe053,
          };

          const layout = [
              ["Esc", "F1", "F2", "F3", "F4", "F5", "F6",
               "F7", "F8", "F9", "F10", "F11", "F12", "PgUp", "PgDn"],
              [..."`1234567890-=".split(""), "Back"],
              ["Tab", ..."QWERTYUIOP[]\\".split("")],
              ["Caps", ..."ASDFGHJKL;'".split(""), "Enter"],
              ["Shift", ..."ZXCVBNM,./".split(""), "Up"],
              ["Ctrl", "Alt", "Space", "Del", "Left", "Down", "Right"],
          ];

          layout.forEach((row, i) => {
              const rowEl = document.getElementById(`row${i+1}`);
              row.forEach(key => {
                  const btn = document.createElement('button');
                  if (key.length === 1)
                      btn.className = 'key';
                  else if (key[0] === 'F' || key == 'Esc')
                      btn.className = 'key fkey';
                  else if (key === 'Space')
                      btn.className = 'key space';
                  else
                      btn.className = 'key wide';
                  btn.textContent = key;
                  btn.setAttribute('data-val', key);
                  rowEl.appendChild(btn);
              });
          });

          kb.onmousedown = (e) => {
              e.preventDefault();
              const btn = e.target.closest('button');
              if (!btn) return;
              const val = btn.getAttribute('data-val');
              inst.send_kbd(1, key2code[val]);
          };

          kb.onmouseup = (e) => {
              e.preventDefault();
              const btn = e.target.closest('button');
              if (!btn) return;
              const val = btn.getAttribute('data-val');
              inst.send_kbd(0, key2code[val]);
          };

          kb.addEventListener('touchstart', kb.onmousedown, { passive: false });
          kb.addEventListener('touchend', kb.onmouseup, { passive: false });
          kb.style.display = 'flex';
          })();
        </script>
        <script>
            let zidx = 10;
            let zobj = document.getElementById('tit1');
            function drag(div, div1, btn1, btn2) {
                let x, y, dragging = false;
                function f() {
                    if (!(zobj === undefined)) {
                        zobj.className = "title-bar inactive";
                    }
                    div1.className = "title-bar";
                    div.style.zIndex = zidx;
                    zidx++;
                    zobj = div1;
                }

                div.addEventListener('focusin', f);
                div.addEventListener('mousedown', f);
                div.addEventListener('touchstart', f);

                div1.addEventListener('mousedown', (e) => {
                    dragging = true;
                    x = e.clientX - div.offsetLeft;
                    y = e.clientY - div.offsetTop;
                });

                document.addEventListener('mousemove', (e) => {
                    if (dragging) {
                        div.style.left = e.clientX - x + 'px';
                        div.style.top = e.clientY - y + 'px';
                    }
                });

                document.addEventListener('mouseup', () => {
                    dragging = false;
                });

                div1.addEventListener('touchstart', (e) => {
                    dragging = true;
                    x = e.changedTouches[0].clientX - div.offsetLeft;
                    y = e.changedTouches[0].clientY - div.offsetTop;
                });

                document.addEventListener('touchend', () => {
                    dragging = false;
                });

                document.addEventListener('touchmove', (e) => {
                    if (dragging) {
                        div.style.left = e.changedTouches[0].clientX - x + 'px';
                        div.style.top = e.changedTouches[0].clientY - y + 'px';
                    }
                });

                if (btn1 !== null) {
                    btn1.addEventListener('click', () => {
                        div.style.position = 'static';
                    });
                }

                if (btn2 !== null) {
                    btn2.addEventListener('click', () => {
                        div.style.position = 'absolute';
                        div.style.left = '50px';
                        div.style.top = '50px';
                    });
                }
            }

            drag(document.getElementById('win1'), document.getElementById('tit1'), document.getElementById('btn11'), document.getElementById('btn12'));
            drag(document.getElementById('win2'), document.getElementById('tit2'), document.getElementById('btn21'), document.getElementById('btn22'));
            drag(document.getElementById('win3'), document.getElementById('tit3'), null, null);
            {
                const d1 = document.getElementById('win1');
                const d3 = document.getElementById('win3');
                d3.style.position = 'absolute';
                d3.style.left = '50px';
                d3.style.top = '500px';
            }
        </script>
    </body>
</html>
